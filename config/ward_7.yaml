ward:
  number: 7
  area_acres: 105.12
  city: Kolkata
  state: West Bengal
  country: India

# ── Georeferencing (biggest accuracy lever) ──────────────────────────────────
georeferencing:
  # Source priority: qgis_points uses your QGIS Georeferencer .points file
  # Options: qgis_points | manual | ocr | auto
  source: "qgis_points"
  qgis_points_path: "ground_truth/ward7/Ward_7.png.points"
  qgis_source_crs: "EPSG:3857"

  # Transform method: tps (best for scanned maps) | affine | polynomial
  method: "tps"
  min_gcps: 4
  use_ransac: false
  ransac_inlier_threshold_m: 80

geocode:
  bbox:
    min_lon: 88.358
    max_lon: 88.378
    min_lat: 22.588
    max_lat: 22.608
  nominatim_url: "https://nominatim.openstreetmap.org/search"
  user_agent: "BakchodiWardMapPipeline/1.0"
  request_delay_sec: 1.1
  fuzzy_match_threshold: 80
  min_gcps: 6

# ── Error tolerance knobs ────────────────────────────────────────────────────
quality:
  max_rmse_m: 80          # warn if GCP fit RMSE exceeds this (relaxed)
  snap_tolerance_m: 12    # manhole-to-pipe snap distance (relaxed for small roads)
  node_merge_tolerance_m: 3

comparison:
  # Tolerances (metres) used in ground truth comparison report
  match_tolerances_m: [5, 10, 15, 20, 30, 50, 100]
  line_buffer_m: 20       # buffer for drainage overlap check (relaxed)
  ground_truth_dir: "ground_truth/ward7"
  gt_potholes: "Potholes_Ward_7.shp"
  gt_drainage: "Drainage_Ward_7.shp"

ocr:
  scale_factor: 0.25

streets:
  - BAGBAZAR STREET
  - RABINDRA SARANI
  - B.T. ROAD
  - BT ROAD
  - BARRACKPORE TRUNK ROAD
  - MAHATMA SISIR KUMAR SARANI
  - DURGA CHARAN MUKHERJEE ST.
  - DURGA CHARAN MUKHERJEE STREET
  - GOPAL NEOGY LN.
  - GOPAL NEOGY LANE
  - ANNADA NEOGY LN.
  - ANNADA NEOGY LANE
  - N.K. SAHA LANE
  - NK SAHA LANE
  - RADHAKANTA LANE
  - NANDALAL BOSE LANE
  - PASUPATI BOSE LANE
  - DURGA CHATTERJEE LANE
  - BANKIM MUKHERJEE SARANI
  - BISVAKOSHA LANE
  - SANTI GHOSH STREET
  - BOSEPARA LN
  - BOSEPARA LANE
  - RAM KANTO BOSE STREET
  - CIRCULAR CANAL
  - RIVER HOOGHLY
  - HOOGHLY RIVER

# ── Feature extraction (second biggest count/quality lever) ──────────────────
colors:
  drainage_green:
    hsv_lower: [30, 25, 30]   # widened for faint/thin green pipes on small roads
    hsv_upper: [95, 255, 255]
    pipe_class: "150-300mm"
  drainage_red:
    hsv_lower: [0, 50, 50]    # widened for lighter red marks
    hsv_upper: [12, 255, 255]
    pipe_class: "brick_sewer"
  drainage_red_wrap:
    hsv_lower: [168, 50, 50]
    hsv_upper: [180, 255, 255]
    pipe_class: "brick_sewer"
  drainage_blue:
    hsv_lower: [95, 40, 40]
    hsv_upper: [135, 255, 255]
    pipe_class: "connection"
  ward_boundary_magenta:
    hsv_lower: [140, 50, 50]
    hsv_upper: [170, 255, 255]

extraction:
  # Manhole / pothole blobs — lowered thresholds for small-road dots
  manhole_min_area: 4
  manhole_max_area: 100
  manhole_min_circularity: 0.35
  manhole_merge_px: 5

  # Also place manholes at pipe junctions & endpoints (helps narrow lanes)
  manholes_from_junctions: true
  junction_neighbor_threshold: 11   # skeleton degree cutoff for endpoints

  # Drainage lines — keep shorter segments on small roads
  drainage_simplify_px: 2.0
  drainage_merge_endpoint_px: 4
  drainage_min_length_px: 8

  # Thin-line boost: light dilate before skeletonize on green/red masks
  thin_line_dilate_iterations: 1
  morphology_kernel_size: 2
  morphology_open_size: 1          # lighter open = less destruction of thin strokes

crs:
  output: "EPSG:4326"
  utm: "EPSG:32645"
