# Global pipeline defaults — applied to every ward automatically.
# Per-ward overrides are auto-written to config/generated/ward_N.yaml on first run.
# Edit that file only if you need to tune a specific ward.

city: Kolkata
state: West Bengal
country: India

georeferencing:
  source: auto          # auto | qgis_points | ocr
  method: tps
  min_gcps: 3
  use_ransac: true
  ransac_inlier_threshold_m: 80

geocode:
  bbox:
    min_lon: 88.30
    max_lon: 88.42
    min_lat: 22.52
    max_lat: 22.62
  nominatim_url: "https://nominatim.openstreetmap.org/search"
  user_agent: "BakchodiWardMapPipeline/1.0"
  request_delay_sec: 1.1
  fuzzy_match_threshold: 75
  min_gcps: 6

quality:
  max_rmse_m: 80
  snap_tolerance_m: 12
  node_merge_tolerance_m: 3

comparison:
  match_tolerances_m: [5, 10, 15, 20, 30, 50, 100]
  line_buffer_m: 20

ocr:
  scale_factor: 0.35
  scales: [0.35, 0.5]

# Shared Kolkata street gazetteer (OCR also adds streets found on each map)
streets:
  - BAGBAZAR STREET
  - RABINDRA SARANI
  - B.T. ROAD
  - BT ROAD
  - BARRACKPORE TRUNK ROAD
  - MAHATMA SISIR KUMAR SARANI
  - DURGA CHARAN MUKHERJEE ST.
  - DURGA CHARAN MUKHERJEE STREET
  - GOPAL NEOGY LN.
  - GOPAL NEOGY LANE
  - ANNADA NEOGY LN.
  - N.K. SAHA LANE
  - RADHAKANTA LANE
  - NANDALAL BOSE LANE
  - PASUPATI BOSE LANE
  - DURGA CHATTERJEE LANE
  - BANKIM MUKHERJEE SARANI
  - BISVAKOSHA LANE
  - SANTI GHOSH STREET
  - BOSEPARA LN
  - RAM KANTO BOSE STREET
  - CIRCULAR CANAL
  - RIVER HOOGHLY
  - HOOGHLY RIVER
  - BIDHAN SARANI
  - APC ROAD
  - APC RD

colors:
  drainage_green:
    hsv_lower: [30, 25, 30]
    hsv_upper: [95, 255, 255]
    pipe_class: "150-300mm"
  drainage_red:
    hsv_lower: [0, 50, 50]
    hsv_upper: [12, 255, 255]
    pipe_class: "brick_sewer"
  drainage_red_wrap:
    hsv_lower: [168, 50, 50]
    hsv_upper: [180, 255, 255]
    pipe_class: "brick_sewer"
  drainage_blue:
    hsv_lower: [95, 40, 40]
    hsv_upper: [135, 255, 255]
    pipe_class: "connection"
  ward_boundary_magenta:
    hsv_lower: [140, 50, 50]
    hsv_upper: [170, 255, 255]

extraction:
  manhole_min_area: 4
  manhole_max_area: 100
  manhole_min_circularity: 0.35
  manhole_merge_px: 5
  manholes_from_junctions: true
  junction_neighbor_threshold: 11
  drainage_simplify_px: 2.0
  drainage_merge_endpoint_px: 4
  drainage_min_length_px: 8
  thin_line_dilate_iterations: 1
  morphology_kernel_size: 2
  morphology_open_size: 1

crs:
  output: "EPSG:4326"
  utm: "EPSG:32645"

paths:
  maps_dir: maps
  output_dir: output
  ground_truth_dir: ground_truth
  generated_config_dir: config/generated
